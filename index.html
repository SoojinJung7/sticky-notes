<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2D5E3F">
<title>Sticky Notes</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #2D5E3F 0%, #5A9E6B 30%, #8FBF7A 60%, #E8B84C 85%, #FCEAAA 100%);
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  touch-action: none;
}

/* 온보딩 */
.onboarding {
  position: fixed;
  inset: 0;
  z-index: 20000;
  background: linear-gradient(135deg, #2D5E3F 0%, #5A9E6B 30%, #8FBF7A 60%, #E8B84C 85%, #FCEAAA 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 24px;
}
.onboarding.hidden { display: none; }

.onboarding-logo {
  width: 80px;
  height: 80px;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.onboarding h1 {
  color: #fff;
  font-size: 26px;
  font-weight: 800;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.onboarding p {
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  text-align: center;
  max-width: 300px;
  line-height: 1.5;
}

.onboarding-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 320px;
  margin-top: 12px;
}

.ob-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 20px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.ob-btn:active { transform: scale(0.97); }

.ob-btn-google {
  background: #fff;
  color: #333;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.ob-btn-google:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

.ob-btn-google svg {
  width: 20px;
  height: 20px;
}

.ob-btn-local {
  background: rgba(255,255,255,0.2);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.4);
}
.ob-btn-local:hover { background: rgba(255,255,255,0.3); }

.ob-btn-desc {
  font-size: 11px;
  font-weight: 400;
  opacity: 0.6;
  margin-left: 4px;
}

/* 상단 툴바 */
.toolbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: rgba(35,75,50,0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  padding: 0 12px;
  z-index: 9999;
  gap: 6px;
}

.toolbar-title {
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  margin-right: 8px;
  letter-spacing: -0.5px;
  white-space: nowrap;
  line-height: 30px;
}

.btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  padding: 0 12px;
  height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.2s;
  white-space: nowrap;
  line-height: 30px;
}
.btn:hover { background: rgba(255,255,255,0.35); }
.btn:active { background: rgba(255,255,255,0.4); }

.color-picker {
  display: flex;
  gap: 4px;
  margin-left: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.color-picker::-webkit-scrollbar { display: none; }

.color-dot {
  width: 22px;
  height: 22px;
  min-width: 22px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.5);
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.color-dot:hover, .color-dot.active {
  transform: scale(1.2);
  border-color: #fff;
}

.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 6px;
  align-items: center;
}

.search-box {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 0 10px;
  height: 30px;
  border-radius: 6px;
  font-size: 13px;
  width: 140px;
  outline: none;
}
.search-box::placeholder { color: rgba(255,255,255,0.6); }
.search-box:focus { background: rgba(255,255,255,0.3); }

/* 유저 아바타 */
.user-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.5);
  cursor: pointer;
  object-fit: cover;
}

.user-menu {
  position: absolute;
  top: 44px;
  right: 12px;
  background: #fff;
  border-radius: 8px;
  padding: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  display: none;
  z-index: 10000;
  min-width: 160px;
}
.user-menu.show { display: block; }
.user-menu-item {
  display: block;
  width: 100%;
  padding: 8px 12px;
  border: none;
  background: none;
  text-align: left;
  font-size: 13px;
  color: #333;
  border-radius: 4px;
  cursor: pointer;
}
.user-menu-item:hover { background: #f0f0f0; }
.user-menu-name {
  padding: 8px 12px 4px;
  font-size: 12px;
  color: #999;
  border-bottom: 1px solid #eee;
  margin-bottom: 4px;
}

/* 노트 영역 */
.notes-area {
  position: absolute;
  top: 48px;
  left: 0;
  right: 0;
  bottom: 0;
}

/* 스티키 노트 */
.note {
  position: absolute;
  width: 240px;
  min-height: 180px;
  border-radius: 4px;
  box-shadow: 3px 3px 10px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.2s;
  overflow: hidden;
}
.note:hover { box-shadow: 5px 5px 18px rgba(0,0,0,0.35); }
.note.dragging { opacity: 0.85; box-shadow: 8px 8px 24px rgba(0,0,0,0.4); z-index: 9998 !important; }
.note.hidden-note { display: none; }

.note-header {
  display: flex;
  align-items: center;
  padding: 6px 8px;
  cursor: grab;
  gap: 4px;
  background: rgba(0,0,0,0.08);
}

.note-title-input {
  flex: 1;
  background: transparent;
  border: none;
  font-size: 12px;
  font-weight: 700;
  color: rgba(0,0,0,0.7);
  outline: none;
  min-width: 0;
}

.note-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  color: rgba(0,0,0,0.4);
  padding: 4px;
  border-radius: 3px;
  line-height: 1;
}
.note-btn:hover { background: rgba(0,0,0,0.1); color: rgba(0,0,0,0.7); }

.note-body {
  flex: 1;
  padding: 8px 10px;
  font-size: 14px;
  line-height: 1.5;
  color: rgba(0,0,0,0.75);
  outline: none;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
  -webkit-user-select: text;
  user-select: text;
}

.note-footer {
  padding: 4px 8px;
  font-size: 10px;
  color: rgba(0,0,0,0.3);
  text-align: right;
}

/* 리사이즈 핸들 */
.note-resize {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 24px;
  height: 24px;
  cursor: nwse-resize;
  opacity: 0.3;
}
.note-resize::after {
  content: '';
  position: absolute;
  bottom: 4px;
  right: 4px;
  width: 10px;
  height: 10px;
  border-right: 2px solid rgba(0,0,0,0.4);
  border-bottom: 2px solid rgba(0,0,0,0.4);
}

/* 색상 팔레트 팝업 */
.palette-popup {
  position: absolute;
  background: #fff;
  border-radius: 8px;
  padding: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  display: none;
  z-index: 10000;
  gap: 4px;
  flex-wrap: wrap;
  width: 130px;
}
.palette-popup.show { display: flex; }
.palette-dot {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid #eee;
  cursor: pointer;
  transition: transform 0.15s;
}
.palette-dot:hover { transform: scale(1.15); border-color: #999; }

/* 빈 상태 */
.empty-state {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: rgba(255,255,255,0.6);
  padding: 20px;
}
.empty-state h2 { font-size: 22px; margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* 모바일 반응형 */
@media (max-width: 600px) {
  .toolbar {
    padding: 8px 12px 0 12px;
    gap: 4px;
    flex-wrap: wrap;
    height: auto;
  }

  .toolbar-title { font-size: 13px; margin-right: 4px; }

  .search-box { width: 100px; font-size: 13px; height: 30px; padding: 0 8px; }

  /* 색상 선택기: 툴바 아래 별도 줄 + 스와이프 */
  .color-picker {
    order: 10;
    width: 100%;
    margin: 6px 0 8px 0;
    gap: 8px;
    padding: 2px 8px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    justify-content: center;
  }

  .color-dot {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-width: 2px;
    scroll-snap-align: center;
  }
  .color-dot.active {
    transform: scale(1.15);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .notes-area { top: 82px; }

  .note {
    width: calc(100vw - 32px) !important;
    min-height: 140px !important;
    left: 0 !important;
    position: relative !important;
    margin-bottom: 12px;
    top: auto !important;
  }

  .notes-area {
    display: flex;
    flex-direction: column;
    padding: 12px 16px;
    overflow-y: auto;
    align-items: center;
  }

  .note.dragging { opacity: 1; }
  .note-resize { display: none; }

  .note-body { font-size: 15px; }

  .empty-state { position: relative; top: auto; left: auto; transform: none; margin-top: 25vh; }
}

/* 설치 배너 */
.install-banner {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(35,75,50,0.8);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #fff;
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 13px;
  display: none;
  align-items: center;
  gap: 12px;
  z-index: 10001;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.install-banner.show { display: flex; }
.install-btn {
  background: #fff;
  color: #333;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
}
.install-dismiss {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  font-size: 18px;
  padding: 0 4px;
}

/* 로딩 스피너 */
.loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 19999;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 온보딩 -->
<div class="onboarding" id="onboarding">
  <img class="onboarding-logo" src="icon-192.png" alt="logo">
  <h1>Sticky Notes</h1>
  <p>간편하게 메모를 작성하고 관리하세요</p>
  <div class="onboarding-buttons">
    <button class="ob-btn ob-btn-google" id="obGoogle">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google로 로그인 <span class="ob-btn-desc">어디서나 동기화</span>
    </button>
    <button class="ob-btn ob-btn-local" id="obLocal">
      이 기기에서만 사용 <span class="ob-btn-desc">로그인 없이</span>
    </button>
  </div>
</div>

<!-- 로딩 -->
<div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div></div>

<!-- 툴바 -->
<div class="toolbar">
  <span class="toolbar-title">Sticky Notes</span>
  <button class="btn" id="addBtn">+ 새 메모</button>
  <div class="color-picker" id="colorPicker"></div>
  <div class="toolbar-right">
    <input type="text" class="search-box" id="searchBox" placeholder="검색...">
    <button class="btn" id="clearSearchBtn" style="display:none;">X</button>
    <img class="user-avatar" id="userAvatar" style="display:none;" alt="user">
  </div>
</div>

<!-- 유저 메뉴 -->
<div class="user-menu" id="userMenu">
  <div class="user-menu-name" id="userMenuName"></div>
  <button class="user-menu-item" id="logoutBtn">로그아웃</button>
</div>

<div class="notes-area" id="notesArea">
  <div class="empty-state" id="emptyState">
    <h2>메모가 없습니다</h2>
    <p>"+ 새 메모" 버튼을 눌러 시작하세요!</p>
  </div>
</div>

<div class="palette-popup" id="palettePopup"></div>

<div class="install-banner" id="installBanner">
  <span>홈 화면에 추가하시겠어요?</span>
  <button class="install-btn" id="installBtn">설치</button>
  <button class="install-dismiss" id="installDismiss">✕</button>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQ6H1_UdCaXAH2l4XqGuMGrt_ILAsUoIU",
  authDomain: "stickynote-b705d.firebaseapp.com",
  projectId: "stickynote-b705d",
  storageBucket: "stickynote-b705d.firebasestorage.app",
  messagingSenderId: "458922481738",
  appId: "1:458922481738:web:c8c00af9914089d9efeeb3",
  measurementId: "G-JZ5J3WW0KN"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// ===== 상수 =====
const COLORS = [
  { name: '크림', hex: '#FCEAAA' },
  { name: '골드', hex: '#E8C86C' },
  { name: '연초록', hex: '#B8D9A0' },
  { name: '세이지', hex: '#8FBF7A' },
  { name: '초록', hex: '#6DA870' },
  { name: '진초록', hex: '#4A8C5E' },
  { name: '포레스트', hex: '#A8D5BA' },
  { name: '흰색', hex: '#FFFFFF' },
];

const STORAGE_KEY = 'sticky-notes-data';
const MODE_KEY = 'sticky-notes-mode';
const isMobile = window.innerWidth <= 600;

let notes = [];
let selectedColor = COLORS[0].hex;
let nextZ = 100;
let dragState = null;
let resizeState = null;
let saveTimeout = null;
let currentUser = null;
let authMode = localStorage.getItem(MODE_KEY); // 'google' | 'local' | null

// ===== 저장/불러오기 =====
function loadNotesLocal() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  } catch { return []; }
}

function saveNotesLocal(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

async function loadNotesCloud() {
  if (!currentUser) return [];
  try {
    const snap = await getDoc(doc(db, 'users', currentUser.uid));
    return snap.exists() ? (snap.data().notes || []) : [];
  } catch (e) {
    console.error('Cloud load error:', e);
    return [];
  }
}

async function saveNotesCloud(data) {
  if (!currentUser) return;
  try {
    await setDoc(doc(db, 'users', currentUser.uid), { notes: data });
  } catch (e) {
    console.error('Cloud save error:', e);
  }
}

async function loadNotes() {
  if (authMode === 'google' && currentUser) {
    return await loadNotesCloud();
  }
  return loadNotesLocal();
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    if (authMode === 'google' && currentUser) {
      saveNotesLocal(notes); // 로컬 백업도 유지
      await saveNotesCloud(notes);
    } else {
      saveNotesLocal(notes);
    }
  }, 300);
}

// ===== 온보딩 =====
function showOnboarding() {
  document.getElementById('onboarding').classList.remove('hidden');
}

function hideOnboarding() {
  document.getElementById('onboarding').classList.add('hidden');
}

function showLoading() {
  document.getElementById('loadingOverlay').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

// ===== 유저 UI =====
function showUserUI(user) {
  const avatar = document.getElementById('userAvatar');
  avatar.src = user.photoURL || '';
  avatar.style.display = user.photoURL ? 'block' : 'none';
  document.getElementById('userMenuName').textContent = user.displayName || user.email;
}

function hideUserUI() {
  document.getElementById('userAvatar').style.display = 'none';
  document.getElementById('userMenu').classList.remove('show');
}

// ===== 초기화 =====
async function init() {
  buildColorPicker();
  buildPalettePopup();
  setupEvents();
  setupPWA();

  // 온보딩 분기
  if (authMode === 'local') {
    hideOnboarding();
    notes = loadNotesLocal();
    renderAll();
  } else if (authMode === 'google') {
    hideOnboarding();
    showLoading();
    // Firebase auth state가 결정될 때까지 기다림
    onAuthStateChanged(auth, async (user) => {
      hideLoading();
      if (user) {
        currentUser = user;
        showUserUI(user);
        notes = await loadNotesCloud();
        renderAll();
      } else {
        // 토큰 만료 등 → 온보딩으로
        authMode = null;
        localStorage.removeItem(MODE_KEY);
        showOnboarding();
      }
    });
  } else {
    // 첫 방문
    showOnboarding();
  }
}

// 온보딩 버튼
document.getElementById('obGoogle').addEventListener('click', async () => {
  showLoading();
  try {
    const result = await signInWithPopup(auth, provider);
    currentUser = result.user;
    authMode = 'google';
    localStorage.setItem(MODE_KEY, 'google');
    showUserUI(currentUser);
    hideOnboarding();

    // 로컬에 기존 메모가 있으면 클라우드로 마이그레이션
    const localNotes = loadNotesLocal();
    const cloudNotes = await loadNotesCloud();
    if (localNotes.length > 0 && cloudNotes.length === 0) {
      notes = localNotes;
      await saveNotesCloud(notes);
    } else {
      notes = cloudNotes;
    }
    renderAll();
  } catch (e) {
    console.error('Login error:', e);
    alert('로그인에 실패했습니다. 다시 시도해주세요.');
  }
  hideLoading();
});

document.getElementById('obLocal').addEventListener('click', () => {
  authMode = 'local';
  localStorage.setItem(MODE_KEY, 'local');
  hideOnboarding();
  notes = loadNotesLocal();
  renderAll();
});

// 유저 메뉴
document.getElementById('userAvatar').addEventListener('click', () => {
  document.getElementById('userMenu').classList.toggle('show');
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await signOut(auth);
  currentUser = null;
  authMode = null;
  localStorage.removeItem(MODE_KEY);
  hideUserUI();
  notes = [];
  renderAll();
  showOnboarding();
});

document.addEventListener('click', e => {
  if (!e.target.closest('#userAvatar') && !e.target.closest('#userMenu')) {
    document.getElementById('userMenu').classList.remove('show');
  }
});

// ===== UI 빌드 =====
function buildColorPicker() {
  const cp = document.getElementById('colorPicker');
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (c.hex === selectedColor ? ' active' : '');
    dot.style.background = c.hex;
    dot.title = c.name;
    dot.addEventListener('click', () => {
      selectedColor = c.hex;
      cp.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
    });
    cp.appendChild(dot);
  });
}

function buildPalettePopup() {
  const pp = document.getElementById('palettePopup');
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'palette-dot';
    dot.style.background = c.hex;
    dot.dataset.color = c.hex;
    pp.appendChild(dot);
  });
}

function renderAll() {
  const area = document.getElementById('notesArea');
  area.querySelectorAll('.note').forEach(n => n.remove());
  notes.forEach((note, i) => area.appendChild(createNoteEl(note, i)));
  updateEmpty();
}

function updateEmpty() {
  document.getElementById('emptyState').style.display = notes.length === 0 ? 'block' : 'none';
}

function createNoteEl(note, idx) {
  const el = document.createElement('div');
  el.className = 'note';
  el.dataset.idx = idx;
  if (!isMobile) {
    el.style.left = note.x + 'px';
    el.style.top = note.y + 'px';
    el.style.width = (note.w || 240) + 'px';
    el.style.minHeight = (note.h || 180) + 'px';
  }
  el.style.background = note.color;
  el.style.zIndex = note.z || nextZ++;

  const ts = new Date(note.created).toLocaleDateString('ko-KR', {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });

  el.innerHTML = `
    <div class="note-header">
      <input class="note-title-input" value="${escHtml(note.title || '')}" placeholder="제목..." data-field="title">
      <button class="note-btn note-palette-btn" title="색상 변경">🎨</button>
      <button class="note-btn note-dup-btn" title="복제">📋</button>
      <button class="note-btn note-del-btn" title="삭제">✕</button>
    </div>
    <div class="note-body" contenteditable="true" data-field="body">${escHtml(note.body || '')}</div>
    <div class="note-footer">${ts}</div>
    <div class="note-resize"></div>
  `;
  return el;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getPointerPos(e) {
  if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

// ===== 이벤트 =====
function setupEvents() {
  const area = document.getElementById('notesArea');

  document.getElementById('addBtn').addEventListener('click', addNote);

  const searchBox = document.getElementById('searchBox');
  const clearBtn = document.getElementById('clearSearchBtn');
  searchBox.addEventListener('input', () => {
    const q = searchBox.value.toLowerCase();
    clearBtn.style.display = q ? 'inline-block' : 'none';
    area.querySelectorAll('.note').forEach(el => {
      const idx = +el.dataset.idx;
      const note = notes[idx];
      const match = !q || (note.title + ' ' + note.body).toLowerCase().includes(q);
      el.classList.toggle('hidden-note', !match);
    });
  });
  clearBtn.addEventListener('click', () => {
    searchBox.value = '';
    clearBtn.style.display = 'none';
    area.querySelectorAll('.note').forEach(el => el.classList.remove('hidden-note'));
  });

  function onPointerDown(e) {
    const noteEl = e.target.closest('.note');
    if (!noteEl) return;
    const idx = +noteEl.dataset.idx;

    if (e.target.closest('.note-del-btn')) {
      noteEl.remove();
      notes.splice(idx, 1);
      reindex();
      updateEmpty();
      scheduleSave();
      return;
    }
    if (e.target.closest('.note-dup-btn')) { duplicateNote(idx); return; }
    if (e.target.closest('.note-palette-btn')) { showPalette(noteEl, idx); return; }

    if (!isMobile) {
      const pos = getPointerPos(e);
      if (e.target.closest('.note-resize')) {
        resizeState = { el: noteEl, idx, startX: pos.x, startY: pos.y,
          startW: noteEl.offsetWidth, startH: noteEl.offsetHeight };
        e.preventDefault();
        return;
      }
      if (e.target.closest('.note-header') && !e.target.closest('input')) {
        noteEl.style.zIndex = ++nextZ;
        notes[idx].z = nextZ;
        dragState = { el: noteEl, idx, offX: pos.x - noteEl.offsetLeft, offY: pos.y - noteEl.offsetTop };
        noteEl.classList.add('dragging');
        e.preventDefault();
      }
      noteEl.style.zIndex = ++nextZ;
      notes[idx].z = nextZ;
    }
  }

  function onPointerMove(e) {
    if (dragState) {
      const pos = getPointerPos(e);
      dragState.el.style.left = (pos.x - dragState.offX) + 'px';
      dragState.el.style.top = (pos.y - dragState.offY) + 'px';
      notes[dragState.idx].x = pos.x - dragState.offX;
      notes[dragState.idx].y = pos.y - dragState.offY;
    }
    if (resizeState) {
      const pos = getPointerPos(e);
      const w = Math.max(180, resizeState.startW + (pos.x - resizeState.startX));
      const h = Math.max(120, resizeState.startH + (pos.y - resizeState.startY));
      resizeState.el.style.width = w + 'px';
      resizeState.el.style.minHeight = h + 'px';
      notes[resizeState.idx].w = w;
      notes[resizeState.idx].h = h;
    }
  }

  function onPointerUp() {
    if (dragState) { dragState.el.classList.remove('dragging'); dragState = null; scheduleSave(); }
    if (resizeState) { resizeState = null; scheduleSave(); }
  }

  area.addEventListener('mousedown', onPointerDown);
  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('mouseup', onPointerUp);
  area.addEventListener('touchstart', onPointerDown, { passive: false });
  document.addEventListener('touchmove', onPointerMove, { passive: false });
  document.addEventListener('touchend', onPointerUp);

  area.addEventListener('input', e => {
    const noteEl = e.target.closest('.note');
    if (!noteEl) return;
    const idx = +noteEl.dataset.idx;
    if (e.target.dataset.field === 'title') notes[idx].title = e.target.value;
    else if (e.target.dataset.field === 'body') notes[idx].body = e.target.innerText;
    scheduleSave();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.palette-popup') && !e.target.closest('.note-palette-btn')) {
      document.getElementById('palettePopup').classList.remove('show');
    }
  });

  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'n') { e.preventDefault(); addNote(); }
  });
}

function addNote() {
  const area = document.getElementById('notesArea');
  const x = 40 + (notes.length % 6) * 30;
  const y = 20 + (notes.length % 5) * 30;
  const note = {
    title: '', body: '', color: selectedColor,
    x, y, w: 240, h: 180, z: ++nextZ,
    created: new Date().toISOString(),
  };
  notes.push(note);
  const el = createNoteEl(note, notes.length - 1);
  area.appendChild(el);
  el.querySelector('.note-body').focus();
  updateEmpty();
  scheduleSave();
}

function duplicateNote(idx) {
  const src = notes[idx];
  const note = { ...src, x: src.x + 20, y: src.y + 20, z: ++nextZ, created: new Date().toISOString() };
  notes.push(note);
  document.getElementById('notesArea').appendChild(createNoteEl(note, notes.length - 1));
  scheduleSave();
}

function showPalette(noteEl, idx) {
  const pp = document.getElementById('palettePopup');
  const rect = noteEl.querySelector('.note-palette-btn').getBoundingClientRect();
  pp.style.left = Math.min(rect.left, window.innerWidth - 140) + 'px';
  pp.style.top = (rect.bottom + 4) + 'px';
  pp.classList.add('show');
  pp.onclick = e => {
    const dot = e.target.closest('.palette-dot');
    if (!dot) return;
    notes[idx].color = dot.dataset.color;
    noteEl.style.background = dot.dataset.color;
    pp.classList.remove('show');
    scheduleSave();
  };
}

function reindex() {
  document.getElementById('notesArea').querySelectorAll('.note').forEach((el, i) => el.dataset.idx = i);
}

// ===== PWA =====
let deferredPrompt = null;
function setupPWA() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('show');
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  });
  document.getElementById('installDismiss').addEventListener('click', () => {
    document.getElementById('installBanner').classList.remove('show');
  });
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

init();
</script>
